  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0c0e13;
      color: #eef2ff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .link-container {
      max-width: 500px;
      width: 100%;
      text-align: center;
      animation: fadeUp 0.5s ease;
    }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 96px;
      height: 96px;
      margin: 0 auto 1rem;
      background: #2a2f3c;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 0 0 2px #2e3a4e;
    }
    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: -0.3px;
      margin-bottom: 1.5rem;
    }

    .links-list {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin-bottom: 2rem;
    }

    .link-card {
      background: #11151f;
      border: 1px solid #262e3c;
      border-radius: 48px;
      padding: 0.8rem 1.2rem;
      text-decoration: none;
      color: #eef2ff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.2s ease;
    }

    .link-card:hover {
      background: #1a2332;
      border-color: #4a6188;
      transform: translateY(-2px);
    }

    .link-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .link-left i, .link-left .roblox-icon {
      font-size: 1.3rem;
      width: 28px;
      text-align: center;
      color: #8eafe6;
    }

    .link-left span {
      font-weight: 500;
    }

    .link-right i {
      font-size: 0.8rem;
      color: #7e8aa8;
      transition: transform 0.2s;
    }

    .link-card:hover .link-right i {
      transform: translateX(3px);
      color: #cae0ff;
    }

    .footer {
      font-size: 0.7rem;
      color: #7e8aa8;
      margin-top: 1rem;
    }

    hr {
      border: none;
      height: 1px;
      background: #2e3440;
      margin: 1rem 0;
    }

    .roblox-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.3rem;
      height: 1.3rem;
    }
    .roblox-icon svg {
      width: 100%;
      height: 100%;
      fill: currentColor;
      stroke: none;
    }
  </style>
</head>
